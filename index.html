<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مديرية أمن الغاب - النظام الأمني</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --green-primary: #1b5e20;
            --blue-primary: #0d47a1;
            --gold-accent: #d4af37;
            --shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000; margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center; color: #333;
            min-height: 100vh; position: relative;
        }

        /* شاشة تسجيل الدخول */
        #loginPage {
            display: flex; position: fixed; inset: 0; z-index: 2000;
            background: #000000; flex-direction: column; align-items: center; justify-content: center;
        }

        .auth-card {
            background: var(--bg-color); padding: 35px; border-radius: 30px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); text-align: center; width: 85%; max-width: 360px;
            border-top: 5px solid var(--gold-accent);
        }

        .eagle-logo { width: 150px; height: 150px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; box-shadow: 0 0 20px var(--gold-accent); }

        /* الواجهة الرئيسية */
        #mainApp { display: none; width: 100%; max-width: 480px; padding-bottom: 80px; }

        .header {
            background: var(--bg-color); padding: 20px; border-radius: 25px;
            box-shadow: var(--shadow); text-align: center; margin-bottom: 20px;
            border-bottom: 5px solid var(--gold-accent);
        }

        .btn {
            color: white; border: none; padding: 15px; width: 100%;
            border-radius: 18px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-bottom: 12px; transition: 0.3s;
        }
        .btn-green { background: var(--green-primary); }
        .btn-blue { background: var(--blue-primary); }

        .search-box {
            width: 100%; padding: 14px; border-radius: 15px; border: none;
            background: #ffffff; box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
            outline: none; text-align: right; margin-bottom: 15px; box-sizing: border-box;
        }

        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: #ccc; font-weight: bold; }
        .tab-active { background: var(--blue-primary); color: white; }

        /* سجلات البيانات */
        .record-card {
            background: #ffffff; padding: 18px; border-radius: 22px;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: right; position: relative; border-right: 8px solid var(--gold-accent);
        }
        .edit-tag { position: absolute; left: 15px; top: 15px; color: var(--blue-primary); font-size: 13px; cursor: pointer; text-decoration: underline; }

        /* توقيع أسفل الصفحة */
        .footer-signature {
            position: fixed; bottom: 10px; left: 15px;
            text-align: left; color: #ffffff; font-size: 12px;
            line-height: 1.4; z-index: 500; text-shadow: 1px 1px 2px #000;
        }

        /* النوافذ المنبثقة */
        .modal {
            display: none; position: fixed; z-index: 1000; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); overflow-y: auto;
        }
        .modal-content {
            background: var(--bg-color); margin: 5% auto; padding: 25px;
            width: 90%; max-width: 400px; border-radius: 30px;
        }
        .field {
            width: 100%; padding: 13px; margin-bottom: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #fff; outline: none; text-align: right; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div id="loginPage">
        <img src="https://i.imgur.com/E8W8CjL.png" class="eagle-logo" alt="شعار مديرية أمن الغاب">
        <div class="auth-card">
            <h2 style="margin: 0; color: #1a1a1a;">مديرية أمن الغاب</h2>
            <p style="color: #666; margin-bottom: 25px;">نظام الأرشفة الأمني المركزي</p>
            <input type="password" id="passInput" class="field" style="text-align:center; font-size: 18px;" placeholder="كلمة المرور">
            <button class="btn btn-blue" onclick="checkAuth()">تسجيل الدخول</button>
            <p id="errorMsg" style="color:red; display:none; font-weight: bold;">خطأ: تأكد من كلمة المرور</p>
        </div>
    </div>

    <div id="mainApp">
        <div class="header">
            <img src="https://i.imgur.com/E8W8CjL.png" style="width:80px; border-radius: 50%;" alt="Logo">
            <h2 style="margin: 10px 0 5px 0;">الجمهورية العربية السورية</h2>
            <h3 style="margin: 0; color: var(--green-primary); font-size: 20px;">مديرية أمن الغاب</h3>
        </div>

        <div class="main-actions">
            <button class="btn btn-green" onclick="openModal('report')">+ إضافة ضبط جديد</button>
            <button class="btn btn-blue" onclick="openModal('justice')">+ إضافة للسجل العدلي</button>
        </div>

        <div class="tabs">
            <button id="tabR" class="tab-btn tab-active" onclick="switchTab('reports')">سجل الضبوط</button>
            <button id="tabJ" class="tab-btn" onclick="switchTab('justice')">السجل العدلي</button>
        </div>

        <input type="text" id="globalSearch" class="search-box" placeholder="ابحث بالاسم، الرقم، أو الكلمة..." onkeyup="render()">

        <div id="listArea"></div>
    </div>

    <div class="footer-signature">
        تصميم علي الحمود<br>
        0966032845
    </div>

    <div id="modalReport" class="modal">
        <div class="modal-content">
            <h3 id="rTitle" style="text-align:center; color: var(--green-primary);">إضافة ضبط جديد</h3>
            <input type="hidden" id="rIdx">
            <input type="text" id="rDept" class="field" placeholder="القسم">
            <input type="text" id="rNum" class="field" placeholder="رقم الضبط">
            <input type="text" id="rDate" class="field" placeholder="التاريخ">
            <input type="text" id="rType" class="field" placeholder="نوع الضبط">
            <input type="text" id="rStatus" class="field" placeholder="الحالة">
            <textarea id="rSummary" class="field" style="height:120px;" placeholder="الخلاصة..."></textarea>
            <button class="btn btn-green" onclick="saveReport()">حفظ البيانات</button>
            <button class="btn" style="background:#666;" onclick="closeModal('report')">إغلاق</button>
        </div>
    </div>

    <div id="modalJustice" class="modal">
        <div class="modal-content">
            <h3 id="jTitle" style="text-align:center; color: var(--blue-primary);">إضافة للسجل العدلي</h3>
            <input type="hidden" id="jIdx">
            <input type="text" id="jName" class="field" placeholder="الاسم الثلاثي الكامل">
            <input type="text" id="jAddress" class="field" placeholder="العنوان بالتفصيل">
            <input type="text" id="jMother" class="field" placeholder="اسم الأم">
            <input type="text" id="jHouse" class="field" placeholder="المسكن والخانة">
            <input type="text" id="jAction" class="field" placeholder="الإجراء المطلوب">
            <input type="text" id="jNum" class="field" placeholder="رقم المذكرة العدلية">
            <input type="text" id="jSource" class="field" placeholder="مصدر المذكرة">
            <textarea id="jNotes" class="field" style="height:100px;" placeholder="ملاحظات أمنية..."></textarea>
            <button class="btn btn-blue" onclick="saveJustice()">حفظ في الأرشيف</button>
            <button class="btn" style="background:#666;" onclick="closeModal('justice')">إغلاق</button>
        </div>
    </div>

    <script>
        const APP_PASS = "alghab2026";
        let dbReports = JSON.parse(localStorage.getItem('alghab_reports_final_v5')) || [];
        let dbJustice = JSON.parse(localStorage.getItem('alghab_justice_final_v5')) || [];
        let currentTab = 'reports';

        function checkAuth() {
            const input = document.getElementById('passInput').value;
            if(input === APP_PASS) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                render();
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }

        function openModal(t) { document.getElementById('modal' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = 'block'; }
        function closeModal(t) { 
            document.getElementById('modal' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = 'none';
            resetForms();
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tabR').className = t === 'reports' ? 'tab-btn tab-active' : 'tab-btn';
            document.getElementById('tabJ').className = t === 'justice' ? 'tab-btn tab-active' : 'tab-btn';
            render();
        }

        function saveReport() {
            const idx = document.getElementById('rIdx').value;
            const data = {
                dept: document.getElementById('rDept').value, num: document.getElementById('rNum').value,
                date: document.getElementById('rDate').value, type: document.getElementById('rType').value,
                status: document.getElementById('rStatus').value, summary: document.getElementById('rSummary').value
            };
            if(idx === "") dbReports.push(data); else dbReports[idx] = data;
            localStorage.setItem('alghab_reports_final_v5', JSON.stringify(dbReports));
            closeModal('report'); render();
        }

        function saveJustice() {
            const idx = document.getElementById('jIdx').value;
            const data = {
                name: document.getElementById('jName').value, address: document.getElementById('jAddress').value,
                mother: document.getElementById('jMother').value, house: document.getElementById('jHouse').value,
                action: document.getElementById('jAction').value, num: document.getElementById('jNum').value,
                source: document.getElementById('jSource').value, notes: document.getElementById('jNotes').value
            };
            if(idx === "") dbJustice.push(data); else dbJustice[idx] = data;
            localStorage.setItem('alghab_justice_final_v5', JSON.stringify(dbJustice));
            closeModal('justice'); render();
        }

        function editReport(i) {
            const d = dbReports[i];
            document.getElementById('rIdx').value = i;
            document.getElementById('rDept').value = d.dept; document.getElementById('rNum').value = d.num;
            document.getElementById('rDate').value = d.date; document.getElementById('rType').value = d.type;
            document.getElementById('rStatus').value = d.status; document.getElementById('rSummary').value = d.summary;
            document.getElementById('rTitle').innerText = "تعديل الضبط";
            openModal('report');
        }

        function editJustice(i) {
            const d = dbJustice[i];
            document.getElementById('jIdx').value = i;
            document.getElementById('jName').value = d.name; document.getElementById('jAddress').value = d.address;
            document.getElementById('jMother').value = d.mother; document.getElementById('jHouse').value = d.house;
            document.getElementById('jAction').value = d.action; document.getElementById('jNum').value = d.num;
            document.getElementById('jSource').value = d.source; document.getElementById('jNotes').value = d.notes;
            document.getElementById('jTitle').innerText = "تعديل السجل العدلي";
            openModal('justice');
        }

        function render() {
            const area = document.getElementById('listArea');
            const term = document.getElementById('globalSearch').value.toLowerCase();
            area.innerHTML = "";
            const list = currentTab === 'reports' ? dbReports : dbJustice;

            list.forEach((item, i) => {
                if(JSON.stringify(item).toLowerCase().includes(term)) {
                    if(currentTab === 'reports') {
                        area.innerHTML += `<div class="record-card">
                            <span class="edit-tag" onclick="editReport(${i})">تعديل</span>
                            <strong>${item.dept} | رقم: ${item.num}</strong><br>
                            <small>${item.type} - ${item.date}</small><p>${item.summary}</p>
                        </div>`;
                    } else {
                        area.innerHTML += `<div class="record-card" style="border-right-color: var(--blue-primary);">
                            <span class="edit-tag" onclick="editJustice(${i})">تعديل</span>
                            <strong>${item.name}</strong><br>
                            <small>مذكرة: ${item.num} | إجراء: ${item.action}</small><p>${item.notes}</p>
                        </div>`;
                    }
                }
            });
        }

        function resetForms() {
            document.querySelectorAll('.field').forEach(f => f.value = "");
            document.getElementById('rIdx').value = ""; document.getElementById('jIdx').value = "";
        }
    </script>
</body>
</html>
